name: "Take The Color Back"
on:
  push:
    branches:
    - main
    paths-ignore:
    - README.md
    - raw_assets/** 

env:
  GODOT_VERSION: 4.6.0
  USER_VERSION: "1.0.${{ github.run_number }}"
  TALO_SETTINGS: ${{ secrets.TALO_SETTINGS }}

jobs:
  build-desktop-clients:
    name: Export Game Binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            bin-name: color.exe
          - target: linux
            bin-name: color.x86_64
          - target: web
            bin-name: index.html
    steps:
      - uses: actions/checkout@v4
        name: Checkout
      
      - uses: chickensoft-games/setup-godot@v2
        name: Setup Godot
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Prepare directory
        run: mkdir -p dist/${{ matrix.target }}

      - name: Add Talo Settings
        run: echo "$TALO_SETTINGS"  > addons/talo/settings.cfg

      - name: Export ${{ matrix.target }} release
        run: godot --headless --export-release ${{ matrix.target }} ./dist/${{ matrix.target }}/${{ matrix.bin-name }}

      - uses: XanatosX/butler-publish-itchio-action@master
        name: Publish ${{ matrix.target }} Version
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: ${{ matrix.target }}
          ITCH_GAME: take-the-color-back
          ITCH_USER: lazaromenezes
          PACKAGE: dist/${{ matrix.target }}
          VERSION: ${{ env.USER_VERSION }}
  
